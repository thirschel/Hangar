version: 2

updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "build(go):"
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 10

  # Desktop app npm dependencies
  - package-ecosystem: npm
    directory: /desktop
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "build(desktop):"
    labels:
      - dependencies
      - desktop
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
      electron:
        patterns:
          - "electron*"

  # Web (marketing site) npm dependencies
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "build(web):"
    labels:
      - dependencies
      - web
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci:"
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 5
