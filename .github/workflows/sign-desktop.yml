      #   run: |
      #     $tag = "${{ steps.tag.outputs.tag }}"
      #     $signed = Get-ChildItem signed -Filter "*.exe" | Select-Object -First 1
      #     gh release upload $tag $signed.FullName --clobber
      #     Write-Output "Uploaded signed installer: $($signed.Name)"
