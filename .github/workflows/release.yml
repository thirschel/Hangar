name: Release

# Fully automated release pipeline driven by Conventional Commits.
# semantic-release (job `release`) decides the next semver, updates CHANGELOG.md,
# bumps the version in main.go + desktop/package.json, commits + tags, and creates
# the GitHub release. Downstream jobs build artifacts and attach them to that
# release. Everything runs in one workflow run, so there is no cross-workflow tag
# trigger to worry about; the release commit carries [skip ci] to avoid a loop.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      published: ${{ steps.semantic.outputs.published }}
      version: ${{ steps.semantic.outputs.version }}
      tag: ${{ steps.semantic.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install release tooling
        run: npm ci

      - name: Semantic release
        id: semantic
        env:
          # Prefer a GitHub App/PAT (RELEASE_TOKEN) so the chore(release) commit and
          # tag can be pushed to a protected main; falls back to GITHUB_TOKEN when
          # main is unprotected. The [skip ci] in the commit prevents a re-trigger.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  goreleaser:
    name: Go Artifacts
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - name: Set up Go 1.25
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: '1.25'

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build artifacts with GoReleaser (no publish)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Go artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name 'checksums.txt*' \) -print0 \
            | xargs -0 gh release upload "$TAG" --clobber

      - name: Generate Go SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: sbom-go.spdx.json
          output-file: dist/sbom-go.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.tar.gz,dist/*.zip,dist/checksums.txt

      - name: Upload Go SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: gh release upload "$TAG" dist/sbom-go.spdx.json --clobber

  desktop:
    name: Build Desktop Installer
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: '1.25'
          cache: true

      - name: Build Go binary for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          go build -v -ldflags "-s -w" -o dist\cs.exe .

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Generate npm SBOM
        working-directory: desktop
        run: npx @cyclonedx/cyclonedx-npm --output-file ../dist/sbom-desktop.cdx.json --omit dev

      - name: Run tests
        working-directory: desktop
        run: npm run test

      - name: Build NSIS installer
        working-directory: desktop
        env:
          # electron-builder reads GH_TOKEN (GitHub Actions provides GITHUB_TOKEN; with
          # contents: write that is enough for this repo's own release). We keep
          # --publish always because it makes electron-builder GENERATE the updater
          # metadata (latest.yml + .blockmap) in desktop/release/. Its own GitHub upload
          # is best-effort and silently no-ops when the release is not a draft
          # (existingType=release vs publishingType=draft), so the upload step below
          # attaches latest.yml + .blockmap explicitly and fails fast if they are absent.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always

      - name: Attest desktop installer
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: desktop/release/Hangar-Setup-*.exe

      - name: Upload installer + updater metadata + SBOM to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          if (Test-Path dist/sbom-desktop.cdx.json) {
            gh release upload $env:TAG dist/sbom-desktop.cdx.json --clobber
          }

          # The installer AND the electron-updater metadata (latest.yml + .blockmap) must
          # all land on the release, or "Check for updates" 404s on latest.yml. Upload them
          # explicitly (electron-builder's own --publish can skip them) and fail fast if any
          # is missing, so publish-release never undrafts a release without updater metadata.
          $installer = Get-ChildItem -Path desktop/release -Filter "Hangar-Setup-*.exe" | Select-Object -First 1
          $latestYml = Get-ChildItem -Path desktop/release -Filter "latest.yml" | Select-Object -First 1
          $blockMap  = Get-ChildItem -Path desktop/release -Filter "Hangar-Setup-*.exe.blockmap" | Select-Object -First 1

          $missing = @()
          if (-not $installer) { $missing += "Hangar-Setup-*.exe" }
          if (-not $latestYml) { $missing += "latest.yml" }
          if (-not $blockMap)  { $missing += "Hangar-Setup-*.exe.blockmap" }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required desktop release artifact(s) in desktop/release/: $($missing -join ', ')"
            exit 1
          }

          foreach ($artifact in @($installer, $latestYml, $blockMap)) {
            gh release upload $env:TAG $artifact.FullName --clobber
            Write-Output "Uploaded $($artifact.Name) to release $env:TAG"
          }

  publish-release:
    name: Publish Release
    # Runs only after BOTH artifact jobs succeed, so the release is exposed only when
    # complete. semantic-release creates the release as a draft (see .releaserc.json);
    # if goreleaser or desktop fails, this job is skipped and the release stays a
    # hidden draft (invisible on the releases page and to electron-updater) to delete
    # or re-run — no half-published release with partial assets.
    needs: [release, goreleaser, desktop]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Undraft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release.outputs.tag }}
        run: gh release edit "$TAG" --draft=false --latest
