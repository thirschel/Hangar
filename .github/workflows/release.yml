name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    permissions:
      contents: write
      id-token: write
      attestations: write
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate tag matches version in main.go
        run: |
          # Extract version from main.go
          VERSION=$(grep -E '^[[:space:]]*version[[:space:]]*=' main.go | sed -E 's/.*"([^"]+)".*/\1/')
          
          # Get the tag name (remove refs/tags/ prefix)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # Remove 'v' prefix from tag if present
          TAG_VERSION=${TAG_NAME#v}
          
          echo "Version in main.go: $VERSION"
          echo "Tag version: $TAG_VERSION"
          
          # Compare versions
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match version in main.go ($VERSION)"
            echo "Please ensure the tag matches the version defined in main.go"
            exit 1
          fi
          
          echo "✅ Tag version matches main.go version: $VERSION"

      - name: Set up Go 1.25
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: '1.25'

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_REPO_TOKEN: ${{ secrets.BREW_TOKEN }}

      - name: Generate Go SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: sbom-go.spdx.json
          output-file: dist/sbom-go.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: dist/*.tar.gz,dist/*.zip,dist/checksums.txt

  desktop-release:
    name: Build Desktop Installer
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: '1.25'
          cache: true

      - name: Build Go binary for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          go build -v -o dist\cs.exe .

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Generate npm SBOM
        working-directory: desktop
        run: npx @cyclonedx/cyclonedx-npm --output-file ../dist/sbom-desktop.cdx.json --omit dev

      - name: Upload SBOM to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          if (Test-Path dist/sbom-desktop.cdx.json) {
            gh release upload $tag dist/sbom-desktop.cdx.json --clobber
          }

      - name: Run tests
        working-directory: desktop
        run: npm run test

      - name: Build NSIS installer
        working-directory: desktop
        run: npm run dist

      - name: Attest desktop installer
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: desktop/release/claude-squad-Setup-*.exe

      - name: Upload installer to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $installer = Get-ChildItem -Path desktop/release -Filter "claude-squad-Setup-*.exe" | Select-Object -First 1
          if ($installer) {
            gh release upload $tag $installer.FullName --clobber
            Write-Output "Uploaded $($installer.Name) to release $tag"
          } else {
            Write-Error "No installer .exe found in desktop/release/"
            exit 1
          }
