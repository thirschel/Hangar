name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions: write-all
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches version in main.go
        run: |
          # Extract version from main.go
          VERSION=$(grep -E '^[[:space:]]*version[[:space:]]*=' main.go | sed -E 's/.*"([^"]+)".*/\1/')
          
          # Get the tag name (remove refs/tags/ prefix)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # Remove 'v' prefix from tag if present
          TAG_VERSION=${TAG_NAME#v}
          
          echo "Version in main.go: $VERSION"
          echo "Tag version: $TAG_VERSION"
          
          # Compare versions
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match version in main.go ($VERSION)"
            echo "Please ensure the tag matches the version defined in main.go"
            exit 1
          fi
          
          echo "✅ Tag version matches main.go version: $VERSION"

      - name: Set up Go 1.25
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_REPO_TOKEN: ${{ secrets.BREW_TOKEN }}

  desktop-release:
    name: Build Desktop Installer
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true

      - name: Build Go binary for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          go build -v -o dist\cs.exe .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Run tests
        working-directory: desktop
        run: npm run test

      - name: Build NSIS installer
        working-directory: desktop
        run: npm run dist

      - name: Upload installer to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $installer = Get-ChildItem -Path desktop/release -Filter "claude-squad-Setup-*.exe" | Select-Object -First 1
          if ($installer) {
            gh release upload $tag $installer.FullName --clobber
            Write-Output "Uploaded $($installer.Name) to release $tag"
          } else {
            Write-Error "No installer .exe found in desktop/release/"
            exit 1
          }
