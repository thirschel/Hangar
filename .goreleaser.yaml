version: 2.9

project_name: hangar_daemon

builds:
  - binary: hangar-daemon
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

release:
  # semantic-release owns the GitHub release + changelog; GoReleaser only builds,
  # archives, checksums and signs. The release workflow uploads dist/* to the
  # release semantic-release created (see .github/workflows/release.yml).
  disable: true

checksum:
  name_template: 'checksums.txt'

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
