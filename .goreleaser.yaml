version: 2.9

project_name: hangar_daemon

builds:
  - binary: hangar-daemon
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

release:
  # semantic-release owns the GitHub release + changelog; GoReleaser only builds,
  # archives, checksums and signs. The release workflow uploads dist/* to the
  # release semantic-release created (see .github/workflows/release.yml).
  disable: true

checksum:
  name_template: 'checksums.txt'

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    # cosign 3.x writes a single self-contained Sigstore bundle by default and
    # ignores the legacy --output-signature/--output-certificate flags, so emit
    # ${artifact}.bundle instead of separate .sig/.pem files. Consumers verify
    # with `cosign verify-blob --bundle <file>` (requires cosign v3+).
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}
