appId: com.claudesquad.desktop
productName: claude-squad
copyright: Copyright © 2026 claude-squad

directories:
  output: release
  buildResources: build

# The app code is the electron-vite output plus package.json; production
# node_modules (e.g. electron-updater) are bundled automatically.
files:
  - out/**/*
  - package.json

# Ship the Go core-daemon and the runtime icons next to the app. CS_EXE resolves
# resources/dist/cs.exe when packaged; the tray icon resolves resources/build/*.png.
extraResources:
  - from: ../dist/cs.exe
    to: dist/cs.exe
  - from: build
    to: build
    filter:
      - '*.png'

win:
  target:
    - nsis
  icon: build/icon.png
  signingHashAlgorithms:
    - sha256
  # Code signing is configured via CI environment variables — do NOT commit keys here.
  #
  # Option A — Standard OV/EV certificate (electron-builder signs when CSC_LINK is set):
  #   CSC_LINK          base64-encoded .pfx file  (GitHub secret: WIN_CERTIFICATE)
  #   CSC_KEY_PASSWORD  pfx password              (GitHub secret: WIN_CERT_PASSWORD)
  #
  # Option B — Azure Trusted Signing (no EV cert required):
  #   AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID
  #   AZURE_CODE_SIGNING_ACCOUNT_NAME, AZURE_CERT_PROFILE_NAME, AZURE_ENDPOINT
  #
  # Without these env vars the build is unsigned (acceptable for local dev builds).

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: hangar-Setup-${version}.${ext}
  shortcutName: Hangar

# Auto-update source. Must match the GitHub repo that publishes signed releases.
# electron-updater constructs:
#   https://api.github.com/repos/<owner>/<repo>/releases
#   https://github.com/<owner>/<repo>/releases/download/<tag>/<file>
publish:
  provider: github
  owner: thirschel
  repo: Hangar
